.boton-volver{

    align-items:center;
    justify-content:center;

    transition: 0.3s;

}

.boton-volver:hover{

    transform: scale(1.1);
}

/* BOTÓN HOME */

.boton-home{
    position: fixed;

}

.boton-home:hover{
    background:#A10202;
    transform:scale(1.1);
}

/* CASA */

.casa{
    position: relative;
    width: 26px;
    height: 26px;
}

.techo{
    position:absolute;
    top:2px;
    left:4px;

    width:14px;
    height:14px;

    border-top:4px solid white;
    border-left:4px solid white;

    transform: rotate(45deg);
}

.cuerpo{
    position:absolute;
    bottom:1px;
    left:5px;

    width:16px;
    height:12px;

    border:4px solid white;
    border-top:none;

    box-sizing:border-box;
}

/* GALERÍA */

.galeria{

}

.galeria img{

.galeria img:hover{

/* LIGHTBOX */

.lightbox{
    display:none;
    position:fixed;
    inset:0;

}

.lightbox.activo{

    top:15px;
    right:30px;
    font-size:55px;
    cursor:pointer;
    user-select:none;
    color:#910000;
    font-weight:bold;
}

/* FLECHAS */

.flecha{
    position:absolute;
    top:50%;
    transform:translateY(-50%);

    cursor:pointer;

    color:#89D189;

let actual = 0;

function abrir(i){

    actual = i;

    document.getElementById("lightbox").classList.add("activo");

    actualizar();
}

function cerrar(){

    document.getElementById("lightbox").classList.remove("activo");
}

function actualizar(){

    document.getElementById("imagenGrande").src =
    imagenes[actual];
}

function siguiente(){

    actual++;

    if(actual >= imagenes.length){
        actual = 0;
    }

    actualizar();
}

function anterior(){

    actual--;

    if(actual < 0){
        actual = imagenes.length - 1;
    }

    actualizar();
}

document.addEventListener("keydown", function(e){

    const visor =
    document.getElementById("lightbox");

    if(!visor.classList.contains("activo"))
        return;

    if(e.key === "ArrowRight"){
        siguiente();
    }

    if(e.key === "ArrowLeft"){
        anterior();
    }

    if(e.key === "Escape"){
        cerrar();
    }

});
