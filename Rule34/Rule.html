<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Rule34</title>

<style>
html, body{
    margin:0;
    height:100%;
    font-family: Arial;
}

/* Fondo (provisional) */
body{
    background:url("https://i.postimg.cc/sxSQGPjR/XHistories-fondo.jpg") no-repeat center/cover fixed;
    color:white;
}

/* Botón volver */
.boton-volver{
    position: fixed;
    top: 20px;
    left: 20px;
    font-size: 30px;
    text-decoration: none;
    color: white;
    background: rgba(0,0,0,0.6);
    padding: 10px 15px;
    border-radius: 10px;
    z-index:1000;
    transition:0.3s;
}
.boton-volver:hover{
    background: rgba(0,0,0,0.9);
    transform: scale(1.1);
}

/* Título */
.titulo{
    text-align:center;
    font-size:70px;
    margin-top:40px;
    color:#5DFF45;
    text-shadow:2px 2px 10px black;
}

/* Grid de categorías */
.grid{
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap:30px;
    padding:40px;
    max-width:1200px;
    margin:auto;
}

/* Tarjetas */
.tarjeta{
    text-decoration:none;
    color:white;
    text-align:center;
}

.tarjeta img{
    width:100%;
    height:300px;
    object-fit:cover;
    border-radius:15px;
    transition:0.3s;
}

.tarjeta img:hover{
    transform:scale(1.05);
}

.tarjeta p{
    margin-top:10px;
    font-size:20px;
}

/* Responsive */
@media (max-width:600px){
    .titulo{
        font-size:40px;
    }
}
</style>
</head>

<body>

<!-- Regresar a página principal -->
<a href="../index.html" class="boton-volver">←</a>

<h1 class="titulo">Rule34</h1>

<div class="grid">

    <a href="Galeria1.html" class="tarjeta">
        <img src="https://i.postimg.cc/yYzkG3V2/En-Progreso-(Img).jpg">
        <p>Galería 1</p>
    </a>

    <a href="Galeria2.html" class="tarjeta">
        <img src="https://i.postimg.cc/yYzkG3V2/En-Progreso-(Img).jpg">
        <p>Galería 2</p>
    </a>

    <a href="Galeria3.html" class="tarjeta">
        <img src="https://i.postimg.cc/yYzkG3V2/En-Progreso-(Img).jpg">
        <p>Galería 3</p>
    </a>

</div>

</body>
</html>
