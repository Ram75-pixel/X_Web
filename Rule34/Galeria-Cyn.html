let actual = 0;

function abrir(i){

    actual = i;

    document.getElementById("lightbox").classList.add("activo");

    actualizar();
}

function cerrar(){

    document.getElementById("lightbox").classList.remove("activo");
}

function actualizar(){

    document.getElementById("imagenGrande").src =
    imagenes[actual];
}

function siguiente(){

    actual++;

    if(actual >= imagenes.length){
        actual = 0;
    }

    actualizar();
}

function anterior(){

    actual--;

    if(actual < 0){
        actual = imagenes.length - 1;
    }

    actualizar();
}

document.addEventListener("keydown", function(e){

    const visor =
    document.getElementById("lightbox");

    if(!visor.classList.contains("activo"))
        return;

    if(e.key === "ArrowRight"){
        siguiente();
    }

    if(e.key === "ArrowLeft"){
        anterior();
    }

    if(e.key === "Escape"){
        cerrar();
    }

});
