<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Murder Drones</title>

<style>
html, body{
    margin:0;
    height:100%;
    font-family: Arial;
}

/* Fondo (provisional) */
body{
    background:url("https://wimg.rule34.xxx//samples/4742/sample_3b7cffa0cc8ac494d333551d06c9e993.jpg?13126656") no-repeat center/cover fixed;
    color:white;
}

/* Botón volver */
.boton-volver{
    position: fixed;
    top: 20px;
    left: 20px;
    font-size: 30px;
    text-decoration: none;
    color: white;
    background: rgba(0,0,0,0.6);
    padding: 10px 15px;
    border-radius: 10px;
    z-index:1000;
    transition:0.3s;
}
.boton-volver:hover{
    background: rgba(0,0,0,0.9);
    transform: scale(1.1);
}

/* Botón Home */

.boton-home{
    position: fixed;
    top: 20px;
    left: 90px;

    width: 55px;
    height: 55px;

    background:#A10202;

    border-radius:12px;

    display:flex;
    align-items:center;
    justify-content:center;

    transition:0.3s;
    z-index:1000;
}

.boton-home:hover{
    background:#A10202;
    transform:scale(1.1);
}

/* Casa */

.casa{
    position: relative;
    width: 26px;
    height: 26px;
}

.techo{
    position:absolute;
    top:2px;
    left:4px;

    width:14px;
    height:14px;

    border-top:4px solid white;
    border-left:4px solid white;

    transform: rotate(45deg);
}

.cuerpo{
    position:absolute;
    bottom:1px;
    left:5px;

    width:16px;
    height:12px;

    border:4px solid white;
    border-top:none;

    box-sizing:border-box;
}


/* Título */
.titulo{
    text-align:center;
    font-size:70px;
    margin-top:40px;
    color:#8F8FE3;
    text-shadow:2px 2px 10px black;
}

/* Grid de categorías */
.grid{
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap:30px;
    padding:40px;
    max-width:1200px;
    margin:auto;
}

/* Tarjetas */
.tarjeta{
    text-decoration:none;
    color:white;
    text-align:center;
}

.tarjeta img{
    width:300px;
    height:400px;
    object-fit:cover;
    border-radius:15px;
    transition:0.3s;
}

.tarjeta img:hover{
    transform:scale(1.05);
}

.tarjeta p{
    margin-top:10px;
    font-size:20px;
}

/* Responsive */
@media (max-width:600px){
    .titulo{
        font-size:40px;
    }
}
</style>
</head>
