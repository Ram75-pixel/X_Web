<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Animación</title>

<style>
body{
    background:#111;
    color:white;
    font-family:Arial;
    text-align:center;
    margin:0;
}

/* ========================= */
/* BOTÓN VOLVER */
/* ========================= */

.boton-volver{
    position: fixed;
    top: 20px;
    left: 20px;

    width: 55px;
    height: 55px;

    display:flex;
    align-items:center;
    justify-content:center;

    font-size: 28px;
    text-decoration: none;
    color: white;

    background: rgba(0,0,0,0.6);

    border-radius: 12px;
    transition: 0.3s;
    z-index: 1000;
}

.boton-volver:hover{
    background: rgba(0,0,0,0.9);
    transform: scale(1.1);
}

/* ========================= */
/* BOTÓN HOME */
/* ========================= */

.boton-home{
    position: fixed;
    top: 20px;
    left: 90px;

    width: 55px;
    height: 55px;

    background:#A10202;

    border-radius:12px;

    display:flex;
    align-items:center;
    justify-content:center;

    transition:0.3s;
    z-index:1000;
}

.boton-home:hover{
    background:#c40000;
    transform:scale(1.1);
}

/* Casa SOLO bordes */
.casa{
    position: relative;
    width: 26px;
    height: 26px;
}

/* Techo */
.techo{
    position:absolute;
    top:2px;
    left:4px;

    width:14px;
    height:14px;

    border-top:4px solid white;
    border-left:4px solid white;

    transform: rotate(45deg);
}

/* Cuerpo */
.cuerpo{
    position:absolute;
    bottom:1px;
    left:5px;

    width:16px;
    height:12px;

    border:4px solid white;
    border-top:none;

    box-sizing:border-box;
}

/* ========================= */
/* GRID DE VIDEOS */
/* ========================= */

.grid{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:20px;
    margin-top:40px;
}

/* Tarjeta */
.video{
    width:200px;
}

/* Imagen */
.video img{
    width:100%;
    border-radius:10px;
    transition:0.3s;
}

.video img:hover{
    transform:scale(1.05);
}

/* Texto */
.video p{
    margin-top:8px;
}

/* Link */
.video a{
    text-decoration:none;
    color:white;
}
</style>
