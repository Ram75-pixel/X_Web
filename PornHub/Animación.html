<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Animación</title>

<style>
body{
    background:#111;
    color:white;
    font-family:Arial;
    text-align:center;
    margin:0;
}

/* Botón volver */
.boton-volver{
    position: fixed;
    top: 20px;
    left: 20px;
    font-size: 28px;
    text-decoration: none;
    color: white;
    background: rgba(0,0,0,0.6);
    padding: 8px 12px;
    border-radius: 10px;
    transition: 0.3s;
    z-index: 1000;
}

.boton-volver:hover{
    background: rgba(0,0,0,0.9);
    transform: scale(1.1);
}

/* Grid de videos */
.grid{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:20px;
    margin-top:40px;
}

/* Tarjeta */
.video{
    width:200px;
}

.video img{
    width:100%;
    border-radius:10px;
    transition:0.3s;
}

.video img:hover{
    transform:scale(1.05);
}

/* Título */
.video p{
    margin-top:8px;
}

/* Botón invisible (link) */
.video a{
    text-decoration:none;
    color:white;
}
</style>
</head>
