<!DOCTYPE html>
<html lang="es">

<style>
body{
    margin:0;
    font-family: Arial;
    background:url("https://wimg.rule34.xxx//samples/716/sample_f319613ef22d2bf3fe2747fe50d6089c.jpg?17273613") no-repeat center/cover;
    color:white;
}

/* ========================= */
/* BOTÓN VOLVER */
/* ========================= */

.boton-volver{
    position: fixed;
    top: 20px;
    left: 20px;

    width: 55px;
    height: 55px;

    display:flex;
    align-items:center;
    justify-content:center;

    font-size: 30px;
    text-decoration: none;
    color: white;

    background: rgba(0,0,0,0.6);

    border-radius: 12px;
    transition: 0.3s;
    z-index: 1000;
}

.boton-volver:hover{
    background: rgba(0,0,0,0.9);
    transform: scale(1.1);
}

/* ========================= */
/* BOTÓN HOME */
/* ========================= */

.boton-home{
    position: fixed;
    top: 20px;
    left: 90px;

    width: 55px;
    height: 55px;

    background:#A10202;

    border-radius:12px;

    display:flex;
    align-items:center;
    justify-content:center;

    transition:0.3s;
    z-index:1000;
}

.boton-home:hover{
    background:#c40000;
    transform:scale(1.1);
}

/* Casa SOLO bordes */
.casa{
    position: relative;
    width: 26px;
    height: 26px;
}

/* Techo */
.techo{
    position:absolute;
    top:2px;
    left:4px;

    width:14px;
    height:14px;

    border-top:4px solid white;
    border-left:4px solid white;

    transform: rotate(45deg);
}

/* Cuerpo */
.cuerpo{
    position:absolute;
    bottom:1px;
    left:5px;

    width:16px;
    height:12px;

    border:4px solid white;
    border-top:none;

    box-sizing:border-box;
}

/* ========================= */
/* LAYOUT */
/* ========================= */

.contenedor{
    display:flex;
    min-height:100vh;
}

/* Menú lateral */
.menu{
    width:200px;
    background: rgba(255, 153, 0, 0.7);
    padding:20px;
    box-shadow: 2px 0 10px rgba(0,0,0,0.5);
}

/* Título del menú */
.menu h3{
    color: white;
    text-shadow: 2px 2px 10px black;
}

/* Links */
.menu a{
    display:block;
    color:white;
    text-decoration:none;
    margin:15px 0;
    padding:10px;
    border-radius:8px;
    background: rgba(0,0,0,0.6);
    transition: 0.3s;
}

.menu a:hover{
    background:#000;
    transform: scale(1.05);
}

/* Contenido */
.contenido{
    flex:1;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:20px;
}

/* Texto central */
.texto{
    background:rgba(0,0,0,0.7);
    padding:25px;
    border-radius:15px;
}

/* ========================= */
/* RESPONSIVE */
/* ========================= */

@media (max-width: 768px){

    .contenedor{
        flex-direction: column;
    }

    .menu{
        width:100%;
        display:flex;
        justify-content: space-around;
        flex-wrap: wrap;
    }

    .menu a{
        margin:10px;
    }

    .boton-volver,
    .boton-home{
        width:50px;
        height:50px;
    }
}
</style>
</head>
