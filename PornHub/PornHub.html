/* Botón volver */
.boton-volver{

/* Layout */

    background:#000;
    transform: scale(1.05);
}

/* Contenido */
.contenido{
    flex:1;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:20px;
}

/* Texto central */
