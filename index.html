<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>X_Web</title>

<style>
body{
    margin: 0;
    font-family: Arial, sans-serif;
    background-image: url("https://wimg.rule34.xxx//samples/1865/sample_02d7bece4ccc1f3e13e98e80d830b7e8.jpg?13708043");
    background-size: cover;
    background-repeat: no-repeat;
    background-position: center;
    background-attachment: fixed;
    color: white;
    text-align: center;
}

/* Título */
.titulo{
    font-size: 80px;
    margin-top: 40px;
    color: #A3000B;
    text-shadow: 3px 3px 15px black;
}

/* Imagen principal */
.imagen-principal{
    margin: 30px auto;
    width: 300px;
    border: 5px solid white;
    border-radius: 15px;
    overflow: hidden;
}

.imagen-principal img{
    width: 100%;
    display: block;
}

/* CONTENEDOR PRINCIPAL */
.menu{
    display: flex;
    justify-content: center;
    gap: 40px;
    flex-wrap: wrap;
    margin-top: 40px;
}

/* TARJETA */
.card{
    width: 200px;
}

/* IMAGEN */
.card img{
    width: 100%;
    height: 200px;
    object-fit: cover;
    border: 3px solid white;
    border-radius: 15px;
    transition: 0.4s;
}

.card img:hover{
    transform: scale(1.1) rotate(2deg);
}

/* BOTONES */
.boton{
    display: inline-block;
    margin-top: 10px;
    padding: 10px 20px;
    color: white;
    text-decoration: none;
    border-radius: 10px;
    transition: 0.3s;
}

/* COLORES */
.boton-PornHub{ background: #FF9900; }
.boton-XHistories{ background: #6900E8; }
.boton-ComicX{ background: #00D1A4; }
.boton-Rule34{ background: #89D189; }

.boton:hover{
    filter: brightness(1.2);
    transform: scale(1.05);
}
</style>

</head>
