<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>La zorra, La perra y El rey</title>

<style>
html, body{
    height: 100%;
    margin: 0;
    font-family: Arial, sans-serif;
}

body{
    background-image: url("https://i.postimg.cc/sxSQGPjR/XHistories-fondo.jpg");
    background-size: cover;
    background-repeat: no-repeat;
    background-position: center;
    background-attachment: fixed;
    color: white;
}

/* ========================= */
/* BOTÓN VOLVER */
/* ========================= */

.boton-volver{
    position: fixed;
    top: 20px;
    left: 20px;

    width: 55px;
    height: 55px;

    display:flex;
    align-items:center;
    justify-content:center;

    font-size: 30px;
    text-decoration: none;
    color: white;

    background: rgba(0,0,0,0.6);

    border-radius: 12px;
    transition: 0.3s;
    z-index: 1000;
}

.boton-volver:hover{
    background: rgba(0,0,0,0.9);
    transform: scale(1.1);
}

/* ========================= */
/* BOTÓN HOME */
/* ========================= */

.boton-home{
    position: fixed;
    top: 20px;
    left: 90px;

    width: 55px;
    height: 55px;

    background:#A10202;

    border-radius:12px;

    display:flex;
    align-items:center;
    justify-content:center;

    transition:0.3s;
    z-index:1000;
}

.boton-home:hover{
    background:#c40000;
    transform:scale(1.1);
}

/* Casa */
.casa{
    position: relative;
    width: 26px;
    height: 26px;
}

/* Techo SOLO bordes */
.techo{
    position:absolute;
    top:2px;
    left:4px;

    width:14px;
    height:14px;

    border-top:4px solid white;
    border-left:4px solid white;

    transform: rotate(45deg);
}

/* Cuerpo SOLO bordes */
.cuerpo{
    position:absolute;
    bottom:1px;
    left:5px;

    width:16px;
    height:12px;

    border:4px solid white;
    border-top:none;

    box-sizing:border-box;
}

/* ========================= */
/* TÍTULO */
/* ========================= */

.titulo{
    text-align: center;
    font-size: 50px;
    margin-top: 30px;
    color: #D626D9;
    text-shadow: 2px 2px 10px black;
}

/* ========================= */
/* CONTENEDOR */
/* ========================= */

.contenedor{
    width: 85%;
    margin: 80px auto;
    background: rgba(0,0,0,0.75);
    padding: 30px;
    border-radius: 15px;
    display: flex;
    gap: 30px;
    align-items: flex-start;
}

/* Imagen lateral */
.imagen-lateral{
    flex: 0 0 300px;
}

.imagen-lateral img{
    width: 100%;
    border-radius: 15px;
    object-fit: cover;
}

/* Texto */
.historia{
    flex: 1;
    font-size: 18px;
    line-height: 1.8;
    text-align: justify;
}

/* ========================= */
/* RESPONSIVE */
/* ========================= */

@media (max-width: 768px){

    .contenedor{
        flex-direction: column;
    }

    .imagen-lateral{
        width: 100%;
    }

    .titulo{
        font-size: 36px;
    }

    .historia{
        font-size: 16px;
    }
}
</style>
</head>

<body>

<!-- BOTÓN VOLVER -->
<a href="XHistories.html" class="boton-volver">←</a>

<!-- BOTÓN HOME -->
<a href="../index.html" class="boton-home">

    <div class="casa">
        <div class="techo"></div>
        <div class="cuerpo"></div>
    </div>

</a>

<h1 class="titulo">La zorra, La perra y El rey</h1>

<div class="contenedor">

    <div class="imagen-lateral">
        <img src="https://i.postimg.cc/yYzkG3V2/En-Progreso-(Img).jpg">
    </div>

    <div class="historia">

        <p>
        TXT.
        </p>

        <p>
        TXT.
        </p>

        <p>
        TXT.
        </p>

    </div>

</div>

</body>
</html>
