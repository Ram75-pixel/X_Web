/* Asegura altura completa */
html, body{
    height:100%;

}

/* Fondo */
body{
    font-family: Arial;
    background:url("https://i.postimg.cc/sxSQGPjR/XHistories-fondo.jpg") no-repeat center center fixed;
    background-size: cover;

/* ========================= */
/* BOTÓN VOLVER */
/* ========================= */

.boton-volver{
    position: fixed;
    top: 20px;
    left: 20px;

    width: 55px;
    height: 55px;

    display:flex;
    align-items:center;
    justify-content:center;

    font-size: 30px;
    text-decoration: none;
    color: white;

    background: rgba(0,0,0,0.6);

    border-radius: 12px;
    transition: 0.3s;
    z-index: 1000;
}

.boton-volver:hover{
    background: rgba(0,0,0,0.9);
    transform: scale(1.1);
}

/* ========================= */
/* BOTÓN HOME */
/* ========================= */

.boton-home{
    position: fixed;
    top: 20px;
    left: 90px;

    width: 55px;
    height: 55px;

    background:#A10202;

    border-radius:12px;

    display:flex;
    align-items:center;
    justify-content:center;

    transition:0.3s;
    z-index:1000;
}

.boton-home:hover{
    background:#c40000;
    transform:scale(1.1);
}

/* Casa */
.casa{
    position: relative;
    width: 26px;
    height: 26px;
}

/* Techo SOLO bordes */
.techo{
    position:absolute;
    top:2px;
    left:4px;

    width:14px;
    height:14px;

    border-top:4px solid white;
    border-left:4px solid white;

    transform: rotate(45deg);
}

/* Cuerpo SOLO bordes */
.cuerpo{
    position:absolute;
    bottom:1px;
    left:5px;

    width:16px;
    height:12px;

    border:4px solid white;
    border-top:none;

    box-sizing:border-box;
}

/* ========================= */
/* TÍTULOS */
/* ========================= */

.titulo{
    font-size:80px;
    margin-top:30px;
    color:#450096;
    text-shadow:3px 3px 15px black;
}

.subtitulo{
    font-size:30px;
    color:#BD2672;
    margin-bottom:45px;
    text-shadow:2px 2px 10px black;
}

/* ========================= */
/* GRID */
/* ========================= */

.grid{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:85px;          /* Antes 50px */
    padding:40px;
}

/* Tarjeta */
.tarjeta{
    width:200px;
    text-decoration:none;
    color:white;

    display:flex;
    flex-direction:column;
    align-items:center;
}

/* Imagen */
.tarjeta img{
    width:120%;
    height:350px;
    object-fit:cover;

    border-radius:15px;
    border:3px solid white;

    transition:0.3s;
}

/* Hover */
.tarjeta img:hover{
    transform:scale(1.05);
}

/* Texto */
.tarjeta p{
    margin-top:10px;
    font-size:20px;
    text-align:center;
}
}

/* ========================= */
/* RESPONSIVE */
/* ========================= */

@media (max-width:600px){

    .titulo{
        font-size:50px;
    }

    .subtitulo{
        font-size:22px;
    }

    .boton-volver,
    .boton-home{
        width:50px;
        height:50px;
    }

}
