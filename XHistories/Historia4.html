    background-size: cover;

/* Botón volver */
.boton-volver{
    position: fixed;
    top: 20px;
    left: 20px;
    font-size: 28px;
    text-decoration: none;
    color: white;
    background: rgba(0,0,0,0.6);
    padding: 8px 12px;
    border-radius: 10px;
    transition: 0.3s;
    z-index: 1000;
}

.boton-volver:hover{
    background: rgba(0,0,0,0.9);
    transform: scale(1.1);
}

    border-radius: 15px;
    display: flex;
    gap: 30px;
    align-items: flex-start;
}

/* Imagen lateral */

    flex: 0 0 300px;
}

.imagen-lateral img{
    width: 100%;
    border-radius: 15px;
    object-fit: cover;
}

/* Texto */
.historia{
    flex: 1;
    font-size: 18px;
    line-height: 1.8;
    text-align: justify;
}
